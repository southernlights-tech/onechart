suite: test deployment
templates:
  - cronJob.yaml
tests:
  - it: Should mount volume
    set: &values
      sealedFileSecrets:
        - name: service-account-key
          path: /service-account-key
          filesToMount:
            - name: key.json
              source: test-fixture-service-account.json
    asserts:
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].volumeMounts
          value:
            - name: service-account-key
              mountPath: /service-account-key
              readOnly: true
  - it: Should reference volume
    set: *values
    asserts:
      - template: cronJob.yaml
        documentIndex: 0
        equal:
          path: spec.jobTemplate.spec.template.spec.volumes
          value:
            - name: service-account-key
              secret:
                secretName: RELEASE-NAME-service-account-key
