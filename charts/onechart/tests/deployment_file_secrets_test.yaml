suite: test deployment
templates:
  - deployment.yaml
  - configmap.yaml
  - pvc.yaml
tests:
  - it: Should mount volume
    set:
      fileSecrets:
        - name: service-account-key
          path: /service-account-key
          secrets:
            key.json: supersecret
    asserts:
      - template: deployment.yaml
        documentIndex: 0
        equal:
          path: spec.template.spec.containers[0].volumeMounts
          value:
            - name: service-account-key
              mountPath: /service-account-key
              readOnly: true
  - it: Should mount volume with optional subPath
    set:
      fileSecrets:
        - name: service-account-key
          path: /config/service-account-key
          subPath: service-account-key
          secrets:
            key.json: supersecret
    asserts:
      - template: deployment.yaml
        documentIndex: 0
        equal:
          path: spec.template.spec.containers[0].volumeMounts
          value:
            - name: service-account-key
              mountPath: /config/service-account-key
              subPath: service-account-key
              readOnly: true
  - it: Should reference volume
    set:
      fileSecrets:
        - name: service-account-key
          path: /service-account-key
          secrets:
            key.json: supersecret
    asserts:
      - template: deployment.yaml
        documentIndex: 0
        equal:
          path: spec.template.spec.volumes
          value:
            - name: service-account-key
              secret:
                secretName: RELEASE-NAME-service-account-key
