suite: test onechart secret manager strict
templates:
  - deployment.yaml
  - secretProviderClass.yaml
tests:
  - it: Should use secrets-store.csi.k8s.io driver
    set:
      releaseNameOverride: incident-response-bot
      secrets:
        secretManager:
          items:
            - name: dev-secret-agent-0Rje1
              keys: [JIRA_API_TOKEN]
    asserts:
      - template: deployment.yaml
        equal:
          path: spec.template.spec.volumes[0].csi.driver
          value: secrets-store.csi.k8s.io
