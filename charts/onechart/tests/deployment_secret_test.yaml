suite: test deployment
templates:
  - deployment.yaml
  - configmap.yaml
tests:
  - it: Should reference to existing secrets
    set:
      existingSecrets:
      - name: firstsecret
        optional: true
      - name: secondsecret
        optional: true
    asserts:
      - template: deployment.yaml
        documentIndex: 0
        equal:
          path: spec.template.spec.containers[0].envFrom
          value:
          - secretRef:
              name: firstsecret
              optional: true
          - secretRef:
              name: secondsecret
              optional: true
