{{ if .Values.ingress }}
{{- $robustName := include "robustName" (.Values.releaseNameOverride | default .Release.Name) -}}
{{- $resourceName := $robustName -}}
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: {{ $resourceName }}-file-log
  namespace: {{ .Release.Namespace }}
config:
  path: /dev/stdout
  reopen: false
plugin: file-log
{{- end }}
