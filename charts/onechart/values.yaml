image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

# ingress:
#   host: chart-example.local
#   ingressClassName: nginx
#   tlsEnabled: true
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-staging
#   nginxBasicAuth:
#     user: admin
#     password: secret

# vars:
#   MY_VAR: "value"

replicas: 1

# Default strategy provides zero-downtime deployments
# Note: Single replica deployments with volumes will still use Recreate strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 0

nameOverride: ""
releaseNameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podLabels: {}

podSecurityContext:
  fsGroup: 999

securityContext: {}

containerPort: 80

resources:
  requests:
    cpu: "200m"
    memory: "200Mi"
  limits:
    memory: "200Mi"

nodeSelector: {}

tolerations: []

probe:
  enabled: false
  type: "http"
  path: "/"
  command: ["uname", "-a"]
  settings:
    initialDelaySeconds: 0
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 3
    failureThreshold: 3

# Before you use a liveness probe: https://srcco.de/posts/kubernetes-liveness-probes-are-dangerous.html
livenessProbe:
  enabled: false
  path: "/"
  settings:
    initialDelaySeconds: 0
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 3
    failureThreshold: 3

shell: "/bin/sh"

podDisruptionBudgetEnabled: true
spreadAcrossNodes: false

nodePortEnabled: false

# Sticky sessions support (with default settings)
# stickySessions: false

# Session affinity configuration for advanced sticky sessions
# sessionAffinity:
#   enabled: true
#   type: "ClientIP"  # or "None"
#   config:
#     clientIP:
#       timeoutSeconds: 10800  # 3 hours in seconds

# Additional service configuration
# service:
#   externalTrafficPolicy: "Local"  # or "Cluster"

# Set true to enable service monitor.
monitor:
  enabled: false

container: {}
podSpec: {}

# existingConfigMaps:
#   - name: my-config-map
#
# existingSecrets:
#   - name: my-secret

secrets:
  secretManager: {}
  # Example configuration for AWS Secrets Manager:
  # items:
  #   - name: "my-secret-name"
  #     keys:
  #       - "SECRET_KEY_1"
  #       - "SECRET_KEY_2"
  #     # Optional: Remap secret keys to different environment variable names
  #     keyMappings:
  #       SECRET_KEY_1: "ENV_VAR_1"
  #       SECRET_KEY_2: "ENV_VAR_2"
  #   - name: "another-secret"
  #     keys:
  #       - "API_KEY"
  # csi:
  #   name: "secrets-store"
  #   path: "/mnt/secrets-store"

serviceAccountCreate: {}

autoscaling:
  minReplicas: 2
  maxReplicas: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        type: Pods
        value: 5
        periodSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
        type: Pods
        value: 10
        periodSeconds: 15
  # cpuAverageUtilization: percentage of the requested value of the resource for the pods.
  # memoryAverageUtilization: percentage of the requested value of the resource for the pods.
