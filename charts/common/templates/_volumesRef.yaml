{{- define "common.volumesRef.tpl" }}
{{- if or (or (or (.Values.secrets.secretManager) (.Values.volumes) (.Values.sealedFileSecrets)) .Values.fileSecrets) .Values.existingFileSecrets }}
volumes:
  {{- $secretManagerItems := include "common.secretManagerItems" . -}}
  {{- if and $secretManagerItems (ne $secretManagerItems "[]") -}}
  {{- $data := fromJson (printf "{\"items\": %s}" $secretManagerItems) -}}
  {{- range $item := $data.items }}
  - name: {{ index $item "volumeName" }}
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: {{ index $item "volumeName" }}
  {{- end }}
  {{- end }}
  {{- range .Values.volumes }}
  - name: {{ .name }}
    {{- if .emptyDir }}
    emptyDir: {}
    {{- else if .existingConfigMap }}
    configMap:
      name: {{ .existingConfigMap }}
    {{- else if .existingSecret }}
    secret:
      secretName: {{ .existingSecret }}
    {{- else if .fileName }}
    configMap:
      name: {{ template "common.robustName" (printf "%s-%s" (include "common.releaseNameOverride" $) .name) }}
    {{- else if .hostPath }}
    hostPath:
      path: {{ .hostPath.path }}
      {{- if .hostPath.type }}
      type: {{ .hostPath.type }}
      {{- end }}
    {{- else }}
    persistentVolumeClaim:
      {{- if .existingClaim }}
      claimName: {{ .existingClaim }}
      {{ else }}
      claimName: {{ printf "%s-%s" (include "common.releaseNameOverride" $) .name }}
      {{- end }}
      {{- end }}
{{- end }}
  {{- range .Values.sealedFileSecrets }}
  - name: {{ .name }}
    secret:
      secretName: {{ printf "%s-%s" (include "common.releaseNameOverride" $) .name }}
  {{- end }}
  {{- range .Values.fileSecrets }}
  - name: {{ .name }}
    secret:
      secretName: {{ printf "%s-%s" (include "common.releaseNameOverride" $) .name }}
  {{- end }}
  {{- range .Values.existingFileSecrets }}
  - name: {{ .name }}
    secret:
      secretName: {{ .name }}
  {{- end }}
{{- end }}
{{- end }}
